name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.os }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        build_type:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake
          -S .
          -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DASYNCLOGGER_BUILD_EXAMPLES=ON
          -DASYNCLOGGER_BUILD_TESTS=ON

      - name: Build
        run: >
          cmake
          --build build
          --config ${{ matrix.build_type }}
          --parallel

      - name: Test
        run: >
          ctest
          --test-dir build
          -C ${{ matrix.build_type }}
          --output-on-failure